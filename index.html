<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JavaScript Banking System</title>

  <!-- Link to the CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="bank-card">
      <div class="bank-card__header">
        <div>
          <p class="eyebrow">JavaScript Project</p>
          <h1>Banking System</h1>
        </div>

        <span class="status">Active</span>
      </div>

      <div class="account-info">
        <p>Account Holder</p>
        <h2 id="account-owner">Loading...</h2>
      </div>

      <div class="balance-box">
        <p>Current Balance</p>
        <h3 id="balance">£0</h3>
      </div>

      <form id="transaction-form" class="transaction-form">
        <label for="amount">Enter amount</label>

        <input
          type="number"
          id="amount"
          placeholder="Example: 100"
          min="1"
          required
        />

        <div class="button-row">
          <button type="button" id="deposit-btn">Deposit</button>
          <button type="button" id="withdraw-btn" class="secondary-btn">Withdraw</button>
        </div>
      </form>

      <div class="message-box">
        <p id="message">Use the buttons above to make a transaction.</p>
      </div>

      <section class="transactions">
        <h3>Transaction History</h3>
        <ul id="transaction-list"></ul>
      </section>
    </section>
  </main>

  <!-- 
    type="module" allows us to use ES6 import/export.
    This is needed because app.js imports the Account class from account.js.
  -->
  <script type="module" src="./app.js"></script>
</body>
</html>
